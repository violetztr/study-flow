spring:
  datasource:
    url: jdbc:h2:mem:study_flow;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  data:
    redis:
      host: localhost
      port: 6379
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

study-flow:
  jwt:
    secret: study-flow-test-secret-key-with-enough-length-for-jjwt-signing
    expiration-minutes: 1440
