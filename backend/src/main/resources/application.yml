server:
  port: 8080

spring:
  application:
    name: study-flow
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/study_flow?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${SPRING_DATASOURCE_USERNAME:root}
    password: ${SPRING_DATASOURCE_PASSWORD:root}
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      id-type: auto

study-flow:
  jwt:
    secret: ${STUDY_FLOW_JWT_SECRET:study-flow-local-development-secret-key-change-before-production}
    expiration-minutes: ${STUDY_FLOW_JWT_EXPIRATION_MINUTES:1440}
  media:
    r2:
      account-id: ${R2_ACCOUNT_ID:}
      access-key-id: ${R2_ACCESS_KEY_ID:}
      secret-access-key: ${R2_SECRET_ACCESS_KEY:}
      bucket: ${R2_BUCKET:ruru-community}
      upload-url-ttl: ${R2_UPLOAD_URL_TTL:10m}
      read-url-ttl: ${R2_READ_URL_TTL:1h}
      max-image-bytes: ${R2_MAX_IMAGE_BYTES:10485760}
      max-video-bytes: ${R2_MAX_VIDEO_BYTES:209715200}
