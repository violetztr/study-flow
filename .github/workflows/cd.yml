name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository }}

jobs:
  quality-gate:
    name: Quality gate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Run backend tests
        working-directory: backend
        run: mvn -B test

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

  build-and-push:
    name: Build and push images
    runs-on: ubuntu-latest
    needs: quality-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/backend:${{ github.sha }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend

      - name: Build and push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/frontend:${{ github.sha }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Check deploy secrets
        id: deploy_config
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        run: |
          missing=()
          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_SSH_KEY DEPLOY_PATH GHCR_USERNAME GHCR_TOKEN; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            echo "::notice::Skip server deploy. Missing secrets: ${missing[*]}"
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "skip=false" >> "$GITHUB_OUTPUT"
          echo "port=${DEPLOY_PORT:-22}" >> "$GITHUB_OUTPUT"

      - name: Install SSH key
        if: steps.deploy_config.outputs.skip != 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_PORT: ${{ steps.deploy_config.outputs.port }}
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$DEPLOY_PORT" "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Pull images and restart containers
        if: steps.deploy_config.outputs.skip != 'true'
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ steps.deploy_config.outputs.port }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
          IMAGE_REGISTRY: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          remote_env=$(
            printf 'DEPLOY_PATH=%q GHCR_USERNAME=%q GHCR_TOKEN=%q IMAGE_REGISTRY=%q IMAGE_TAG=%q' \
              "$DEPLOY_PATH" "$GHCR_USERNAME" "$GHCR_TOKEN" "$IMAGE_REGISTRY" "$IMAGE_TAG"
          )

          ssh -i ~/.ssh/deploy_key -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" "$remote_env bash -s" <<'REMOTE'
          set -euo pipefail

          cd "$DEPLOY_PATH"
          git pull --ff-only

          if docker ps >/dev/null 2>&1; then
            USE_SUDO=false
          elif sudo -n docker ps >/dev/null 2>&1; then
            USE_SUDO=true
          else
            echo "Docker is not available without an interactive sudo password."
            echo "Add the deploy user to the docker group or configure passwordless sudo for docker."
            exit 1
          fi

          health_poll() {
            local retries=20
            local delay=3
            for i in $(seq 1 "$retries"); do
              local unhealthy
              if [ "$USE_SUDO" = "true" ]; then
                unhealthy=$(sudo env IMAGE_REGISTRY="$IMAGE_REGISTRY" IMAGE_TAG="$IMAGE_TAG" \
                  docker compose -f docker-compose.yml -f docker-compose.prod.yml ps --format '{{.Name}} {{.Health}}' 2>/dev/null \
                  | grep -v ' healthy' || true)
              else
                unhealthy=$(IMAGE_REGISTRY="$IMAGE_REGISTRY" IMAGE_TAG="$IMAGE_TAG" \
                  docker compose -f docker-compose.yml -f docker-compose.prod.yml ps --format '{{.Name}} {{.Health}}' 2>/dev/null \
                  | grep -v ' healthy' || true)
              fi
              if [ -z "$unhealthy" ]; then
                echo "All services healthy after $i attempt(s)."
                return 0
              fi
              if [ "$i" -eq "$retries" ]; then
                echo "ERROR: Some services are still unhealthy after ${retries} attempts:" >&2
                echo "$unhealthy" >&2
                echo "" >&2
                echo "Full compose status:" >&2
                if [ "$USE_SUDO" = "true" ]; then
                  sudo env IMAGE_REGISTRY="$IMAGE_REGISTRY" IMAGE_TAG="$IMAGE_TAG" \
                    docker compose -f docker-compose.yml -f docker-compose.prod.yml ps >&2
                else
                  IMAGE_REGISTRY="$IMAGE_REGISTRY" IMAGE_TAG="$IMAGE_TAG" \
                    docker compose -f docker-compose.yml -f docker-compose.prod.yml ps >&2
                fi
                echo "" >&2
                echo "Last 100 log lines for backend, frontend, mysql, redis, rabbitmq:" >&2
                local svc
                for svc in backend frontend mysql redis rabbitmq; do
                  echo "--- $svc ---" >&2
                  if [ "$USE_SUDO" = "true" ]; then
                    sudo docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail 100 "$svc" 2>&1 >&2 || true
                  else
                    docker compose -f docker-compose.yml -f docker-compose.prod.yml logs --tail 100 "$svc" 2>&1 >&2 || true
                  fi
                done
                return 1
              fi
              sleep "$delay"
            done
          }

          compose_cmd() {
            if [ "$USE_SUDO" = "true" ]; then
              sudo env IMAGE_REGISTRY="$IMAGE_REGISTRY" IMAGE_TAG="$IMAGE_TAG" \
                docker compose -f docker-compose.yml -f docker-compose.prod.yml "$@"
            else
              IMAGE_REGISTRY="$IMAGE_REGISTRY" IMAGE_TAG="$IMAGE_TAG" \
                docker compose -f docker-compose.yml -f docker-compose.prod.yml "$@"
            fi
          }

          if [ "$USE_SUDO" = "true" ]; then
            printf '%s' "$GHCR_TOKEN" | sudo docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          else
            printf '%s' "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
          fi

          echo "Pulling images with tag: $IMAGE_TAG"
          compose_cmd pull backend frontend

          echo "Starting services (no-build)..."
          compose_cmd up -d --no-build --remove-orphans

          echo "Waiting for services to become healthy..."
          health_poll

          echo "Verifying frontend-proxied health endpoint..."
          curl -fsS --retry 10 --retry-delay 3 "http://127.0.0.1:${FRONTEND_PORT:-80}/api/health"

          echo "Deploy complete."
          compose_cmd ps
          REMOTE
