services:
  mysql:
    image: mysql:8.0
    container_name: study-flow-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-study_flow}
      TZ: Asia/Shanghai
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=+08:00
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p\"$${MYSQL_ROOT_PASSWORD}\" --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: study-flow-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: study-flow-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-ruru}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-ruru-rabbitmq-change-me}
      TZ: Asia/Shanghai
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  srs:
    image: ossrs/srs:5
    container_name: study-flow-srs
    restart: unless-stopped
    command: ["./objs/srs", "-c", "conf/srs.conf"]
    ports:
      - "1935:1935"
      - "8085:8080"
      - "1985:1985"
    volumes:
      - ./docker/srs/srs.conf:/usr/local/srs/conf/srs.conf:ro
      - srs_data:/usr/local/srs/objs/nginx/html
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:1985/api/v1/versions"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
    container_name: study-flow-backend
    restart: unless-stopped
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-study_flow}?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD in .env}
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-ruru}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-ruru-rabbitmq-change-me}
      STUDY_FLOW_JWT_SECRET: ${STUDY_FLOW_JWT_SECRET:?Set STUDY_FLOW_JWT_SECRET in .env}
      STUDY_FLOW_JWT_EXPIRATION_MINUTES: ${STUDY_FLOW_JWT_EXPIRATION_MINUTES:-1440}
      R2_ACCOUNT_ID: ${R2_ACCOUNT_ID:-}
      R2_ACCESS_KEY_ID: ${R2_ACCESS_KEY_ID:-}
      R2_SECRET_ACCESS_KEY: ${R2_SECRET_ACCESS_KEY:-}
      R2_BUCKET: ${R2_BUCKET:-ruru-community}
      R2_UPLOAD_URL_TTL: ${R2_UPLOAD_URL_TTL:-10m}
      R2_READ_URL_TTL: ${R2_READ_URL_TTL:-1h}
      R2_MAX_IMAGE_BYTES: ${R2_MAX_IMAGE_BYTES:-10485760}
      R2_MAX_VIDEO_BYTES: ${R2_MAX_VIDEO_BYTES:-209715200}
      MEDIA_TRANSCODE_ENABLED: ${MEDIA_TRANSCODE_ENABLED:-false}
      MEDIA_TRANSCODE_FFMPEG_PATH: ${MEDIA_TRANSCODE_FFMPEG_PATH:-ffmpeg}
      MEDIA_TRANSCODE_WORK_DIR: ${MEDIA_TRANSCODE_WORK_DIR:-/tmp/ruru-transcode}
      MEDIA_TRANSCODE_TIMEOUT: ${MEDIA_TRANSCODE_TIMEOUT:-30m}
      MEDIA_QUEUE_ENABLED: ${MEDIA_QUEUE_ENABLED:-false}
      MEDIA_QUEUE_EXCHANGE: ${MEDIA_QUEUE_EXCHANGE:-ruru.media}
      MEDIA_QUEUE_TRANSCODE_QUEUE: ${MEDIA_QUEUE_TRANSCODE_QUEUE:-ruru.media.transcode}
      MEDIA_QUEUE_TRANSCODE_ROUTING_KEY: ${MEDIA_QUEUE_TRANSCODE_ROUTING_KEY:-media.transcode.requested}
      MEDIA_QUEUE_FALLBACK_TO_LOCAL_EVENT: ${MEDIA_QUEUE_FALLBACK_TO_LOCAL_EVENT:-true}
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8080/api/health >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 30s

  prometheus:
    image: prom/prometheus:v2.54.0
    container_name: study-flow-prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:9090/-/healthy"]
      interval: 15s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana:11.1.0
    container_name: study-flow-grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "true"
      GF_AUTH_ANONYMOUS_ORG_ROLE: Viewer
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ./docker/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    container_name: study-flow-frontend
    restart: unless-stopped
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost/ >/dev/null || exit 1"]
      interval: 20s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  mysql_data:
  redis_data:
  rabbitmq_data:
  srs_data:
